appId: com.ai-agent.app
productName: ai-agent
directories:
  output: release
files:
  - dist
  - dist-electron
extraResources:
  - resources/icon-*.png
linux:
  target:
    - deb
    - AppImage
  category: Utility
  icon: resources/icon.png
  extraResources:
    - from: /usr/bin/xdotool
      to: bin/xdotool
deb:
  depends:
    - xdotool
  afterInstall: build/postinst
mac:
  target:
    - dmg
  icon: resources/icon.png
win:
  target:
    - nsis
  icon: resources/icon.png
